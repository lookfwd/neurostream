<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>neurostream — live EEG denoising</title>
<!-- mqtt.js only needed for the MQTT source option -->
<script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
<style>
  :root{
    --ink:#0b1621; --panel:#0f1e2b; --panel2:#132536; --line:#1c344a;
    --text:#c9d8e6; --muted:#6f8aa1; --mint:#5fe3c0; --amber:#e0a353; --raw:#456079;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--text);
    font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;
    align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{margin:0;font-size:18px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  header .sub{color:var(--muted);font-size:12.5px}
  .wrap{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 60px)}
  aside{border-right:1px solid var(--line);padding:18px 20px;background:var(--panel)}
  main{padding:18px 22px;display:flex;flex-direction:column;gap:16px;min-width:0}
  label{display:block;color:var(--muted);font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;margin:14px 0 5px}
  select,input[type=text]{width:100%;background:var(--panel2);color:var(--text);
    border:1px solid var(--line);border-radius:6px;padding:8px 9px;font-size:13px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;background:var(--panel2);color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:8px 0;cursor:pointer;font-size:13px}
  .seg button[aria-pressed=true]{background:#10303a;color:var(--mint);border-color:#2d6d63}
  .row{display:flex;gap:10px;align-items:center;margin-top:10px}
  .row input[type=checkbox]{accent-color:var(--mint)}
  .go{width:100%;margin-top:18px;padding:11px;border:0;border-radius:7px;cursor:pointer;
    font-weight:600;letter-spacing:.05em;background:var(--mint);color:#04231d}
  .go.stop{background:var(--amber);color:#2a1904}
  canvas{width:100%;height:800px;border:1px solid var(--line);border-radius:8px;display:block;background:#0b1621}
  .legend{display:flex;gap:18px;color:var(--muted);font-size:12px;align-items:center}
  .swatch{display:inline-block;width:22px;height:3px;border-radius:2px;vertical-align:middle;margin-right:6px}
  .readouts{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;min-width:0}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;min-width:0}
  .stat .k{color:var(--muted);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase}
  .stat .v{font-size:19px;margin-top:3px}
  .stat .v small{font-size:12px;color:var(--muted)}
  .status{font-size:12.5px;color:var(--muted);overflow-wrap:anywhere;word-break:break-word}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b566d;margin-right:7px}
  .dot.on{background:var(--mint)} .dot.warn{background:var(--amber)}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>neurostream</h1>
  <span class="sub">real-time EEG denoising · MQTT → method → clean</span>
  <span class="sub mono" id="active" style="margin-left:auto"></span>
</header>

<div class="wrap">
  <aside>
    <label>Channels</label>
    <div class="seg" id="chan">
      <button data-v="4">4</button><button data-v="8" aria-pressed="true">8</button><button data-v="16">16</button><button data-v="30">30 (IC-U-Net)</button>
    </div>

    <label>Source</label>
    <select id="source">
      <option value="synthetic">Synthetic (blink + EMG)</option>
      <option value="mqtt">MQTT over WebSocket</option>
    </select>
    <div id="mqttFields" style="display:none">
      <label>Broker URL (wss)</label><input id="url" type="text" value="wss://broker.emqx.io:8084/mqtt" />
      <label>Topic</label><input id="topic" type="text" value="eeg/raw" />
    </div>

    <label>Method</label>
    <select id="model">
      <option value="passthrough">Passthrough (identity)</option>
      <optgroup label="Classical · causal (no added latency)">
        <option value="filter">Digital filter (IIR)</option>
        <option value="movingaverage">Moving average</option>
        <option value="lms">Adaptive LMS</option>
        <option value="orica">ORICA (online ICA + reject)</option>
        <option value="ssp">SSP (signal-space projection)</option>
        <option value="oscar">OSCAR (condition + suppress)</option>
      </optgroup>
      <optgroup label="Classical · windowed">
        <option value="cca">CCA (BSS, muscle)</option>
        <option value="atar">ATAR (wavelet)</option>
      </optgroup>
      <optgroup label="Neural · windowed (ONNX)">
        <option value="onnx">Autoencoder / DAE / NovelCNN</option>
      </optgroup>
    </select>
    <div id="onnxFields" style="display:none">
      <label>Model URL (.onnx)</label><input id="modelUrl" type="text" value="/models/denoiser.onnx" />
      <label>Kind</label>
      <select id="kind"><option value="single-channel">single-channel</option><option value="multichannel">multichannel</option></select>
      <div class="row"><input type="checkbox" id="normz" checked /><label style="margin:0">Z-score normalize (per window)</label></div>
    </div>
    <div id="paramFields" style="display:none">
      <label>Method params (JSON)</label><input id="params" type="text" value="{}" />
    </div>

    <label>Window (s)</label>
    <select id="window"><option>2</option><option selected>4</option></select>
    <label>Overlap</label>
    <select id="overlap"><option value="0.5">50%</option><option value="0.8" selected>80%</option><option value="0.95">95%</option></select>

    <div class="row"><input type="checkbox" id="artifacts" checked /><label style="margin:0">Inject artifacts</label></div>
    <div class="row" id="spatialRow"><input type="checkbox" id="spatial" checked /><label style="margin:0">Spatial layout (correlated sources)</label></div>
    <div class="row"><input type="checkbox" id="republish" /><label style="margin:0">Republish clean → eeg/clean</label></div>

    <button class="go" id="go">Start</button>
    <div class="hint" id="hint">Runs immediately: synthetic source + passthrough. No broker or model needed.</div>
  </aside>

  <main>
    <div class="legend">
      <span><span class="swatch" style="background:var(--raw)"></span>raw (ghost)</span>
      <span><span class="swatch" style="background:var(--mint)"></span>cleaned</span>
      <span style="margin-left:auto">view channel
        <select id="viewch" style="width:auto;display:inline-block;padding:4px 6px"></select>
      </span>
    </div>
    <canvas id="scope" width="1000" height="800"></canvas>
    <div class="readouts mono">
      <div class="stat"><div class="k">Provider</div><div class="v" id="s_ep">—</div></div>
      <div class="stat"><div class="k">Inference</div><div class="v" id="s_ms">—<small> ms</small></div></div>
      <div class="stat"><div class="k">Rate</div><div class="v" id="s_rate">—<small> /s</small></div></div>
      <div class="stat"><div class="k">Averaging</div><div class="v" id="s_avg">—<small>×</small></div></div>
      <div class="stat"><div class="k">Latency</div><div class="v" id="s_lat">—<small> s</small></div></div>
      <div class="stat"><div class="k">Hop</div><div class="v" id="s_hop">—<small> ms</small></div></div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="status">idle</span></div>
  </main>
</div>

<script type="module">
import { Pipeline, Scope } from '../src/index.js';

const $ = (id) => document.getElementById(id);
let pipeline = null, scope = null, channels = 8;

// keep the ONNX model URL pointing at the per-channel-count file, unless the user
// has typed a custom (non-default-pattern) URL.
function syncModelUrl() {
  const el = $('modelUrl');
  if (!el.value || /^\/models\/denoiser(_\d+)?\.onnx$/.test(el.value)) {
    el.value = '/models/denoiser_' + channels + '.onnx';
  }
}

// segmented channel control
$('chan').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  [...$('chan').children].forEach((x) => x.setAttribute('aria-pressed', x === b));
  channels = +b.dataset.v;
  syncModelUrl();
});
syncModelUrl();  // initial default matches the default channel count
$('source').addEventListener('change', () => { $('mqttFields').style.display = $('source').value === 'mqtt' ? '' : 'none'; });
const PARAM_HINTS = {
  filter: '{"kind":"iir","highpass":1,"notch":50,"lowpass":40}',
  movingaverage: '{"taps":8}',
  lms: '{"reference":0,"order":8,"mu":0.1}',
  orica: '{"mu":0.008,"kurtosis":10}',
  ssp: '{"projectors":[]}',
  oscar: '{"highpass":1,"k":4}',
  cca: '{"threshold":0.9}',
  atar: '{"k":5,"mode":"linatten"}',
};
$('model').addEventListener('change', () => {
  const v = $('model').value;
  $('onnxFields').style.display = v === 'onnx' ? '' : 'none';
  const hasParams = v in PARAM_HINTS;
  $('paramFields').style.display = hasParams ? '' : 'none';
  if (hasParams) $('params').value = PARAM_HINTS[v];
});

function buildModel() {
  const type = $('model').value;
  if (type === 'passthrough') return { type };
  if (type === 'onnx') return { type, url: $('modelUrl').value, kind: $('kind').value, normalize: $('normz').checked ? 'zscore' : 'none' };
  let params = {};
  try { params = JSON.parse($('params').value || '{}'); }
  catch { setStatus('params is not valid JSON — using {}', 'warn'); }
  return { type, params };
}

function buildConfig() {
  return {
    channels,
    windowSec: +$('window').value,
    overlap: +$('overlap').value,
    source: $('source').value === 'mqtt'
      ? { type: 'mqtt', url: $('url').value, topicIn: $('topic').value, format: 'binary' }
      : { type: 'synthetic', artifacts: $('artifacts').checked, spatial: $('spatial').checked },
    model: buildModel(),
    output: { republish: $('republish').checked, topicOut: 'eeg/clean' },
  };
}

function setStatus(text, cls) { $('status').textContent = text; $('dot').className = 'dot ' + (cls || ''); }

async function start() {
  const cfg = buildConfig();
  pipeline = new Pipeline(cfg);

  scope = new Scope($('scope'), { channels: cfg.channels, sampleRate: 256, spanSec: 6 });
  const vs = $('viewch'); vs.innerHTML = '';
  const oAll = document.createElement('option'); oAll.value = 'all'; oAll.textContent = 'All (stacked)'; vs.appendChild(oAll);
  for (let c = 0; c < cfg.channels; c++) { const o = document.createElement('option'); o.value = c; o.textContent = 'ch ' + c; vs.appendChild(o); }
  vs.value = 'all';
  const applyView = () => scope.setChannel(vs.value === 'all' ? 'all' : +vs.value);
  vs.onchange = applyView; applyView();

  pipeline.on('raw', (r) => scope.pushRaw(r.start, r.channels));
  pipeline.on('clean', (c) => scope.pushClean(c.start, c.channels));
  pipeline.on('status', (s) => setStatus(JSON.stringify(s), s.state === 'streaming' || s.pipeline === 'started' ? 'on' : (s.state === 'reconnecting' ? 'warn' : '')));
  pipeline.on('error', (e) => { setStatus('error: ' + (e.message || e), 'warn'); console.error(e); });
  pipeline.on('stats', (s) => {
    let tag = `${s.method} · ${s.mode}`;
    if (s.convergence != null) {
      tag += s.convergence < 1 ? ` · converging ${Math.round(s.convergence * 100)}%`
                               : ' · converged';
      if (s.rejected) tag += ` · ${s.rejected} rejected`;
    }
    $('active').textContent = tag;
    $('s_ep').textContent = s.ep; $('s_ms').innerHTML = s.inferMs + '<small> ms</small>';
    $('s_rate').innerHTML = s.inferencesPerSec + (s.targetPerSec ? '<small> /' + s.targetPerSec + '</small>' : '<small> /s</small>');
    $('s_avg').innerHTML = s.averaging + '<small>×</small>';
    $('s_lat').innerHTML = s.latencySec + '<small> s</small>';
    $('s_hop').innerHTML = s.hopMs + '<small> ms</small>';
  });

  try { await pipeline.start(); scope.start(); }
  catch (e) { setStatus('failed to start: ' + (e.message || e), 'warn'); console.error(e); return; }
  $('go').textContent = 'Stop'; $('go').classList.add('stop');
}

function stop() {
  pipeline?.stop(); scope?.stop(); pipeline = null;
  $('go').textContent = 'Start'; $('go').classList.remove('stop'); setStatus('stopped');
}

$('go').addEventListener('click', () => (pipeline ? stop() : start()));
setStatus('idle');
</script>
</body>
</html>
